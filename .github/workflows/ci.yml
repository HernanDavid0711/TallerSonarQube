name: CI Python

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar flake8
        run: |
          flake8 main.py test_main.py --max-line-length=88

      - name: Ejecutar pruebas y cobertura
        run: |
          pytest test_main.py -v --ignore=uniagustiniana
          pytest test_main.py --cov=main --cov-report=term-missing --cov-report=xml --ignore=uniagustiniana